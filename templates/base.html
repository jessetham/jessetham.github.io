<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{{.Title}}</title>
  {{with .Description}}<meta name="description" content="{{.}}">{{end}}
  <meta name="author" content="{{.Author}}">
  <link rel="canonical" href="{{.Canonical}}">
  <meta property="og:type" content="{{.OGType}}">
  <meta property="og:site_name" content="{{.SiteTitle}}">
  <meta property="og:title" content="{{.Title}}">
  {{with .Description}}<meta property="og:description" content="{{.}}">{{end}}
  <meta property="og:url" content="{{.Canonical}}">
  {{with .Post}}<meta property="article:published_time" content="{{.Date.Format "2006-01-02"}}">{{end}}
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{.Title}}">
  {{with .Description}}<meta name="twitter:description" content="{{.}}">{{end}}
  <link rel="alternate" type="application/rss+xml" title="{{.SiteTitle}}" href="{{.BaseURL}}/feed.xml">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🫠%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/highlight.css">
  {{with .JSONLD}}{{.}}{{end}}
</head>
<body>
  <header><span class="brand">Jesse Tham</span> <a href="/">Home</a></header>
  <main>{{template "body" .}}</main>
</body>
</html>
